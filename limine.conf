timeout: 0
serial: no
interface_resolution: 0x0
quiet: yes

/VortexOS
    protocol: limine
    path: boot():/boot/kernel.bin
    # Дефолтное разрешение Limine-фреймбуфера (без virtio-gpu смена на лету
    # невозможна, так что хотя бы стартуем не в крошечном окне). Если режим
    # не поддерживается — Limine сам откатится на доступный.
    resolution: 1280x800
